name: Deploy Frontend

# Triggers on every push to main that touches the frontend
on:
  push:
    branches: [main]
    paths:
      - "bsa-web/**"
      - ".github/workflows/deploy-frontend.yml"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Server docroot for bhaisepatisportsacademy.com.np, relative to the rishipa2
# home dir. Confirm against `ls ~` on the server before relying on this.
env:
  DEPLOY_WEB_DIR: bhaisepatisportacademy/bsa-web

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: bsa-web/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      #   Use `npm install` (not `npm ci`): the lockfile is generated on macOS
      #   and npm omits Linux-only native optional deps (e.g. @emnapi/*), which
      #   makes `npm ci` fail on the Linux runner. `npm install` reconciles the
      #   platform-specific optional deps against the committed lockfile.
      - name: Install npm packages
        working-directory: bsa-web
        run: npm install --no-audit --no-fund

      # ── 3b. Fail on high/critical vulnerabilities in production deps ─────────
      - name: Audit production dependencies
        working-directory: bsa-web
        run: npm audit --omit=dev --audit-level=high

      # ── 4. Build static SPA ──────────────────────────────────────────────────
      #   Output lands in bsa-web/.output/public/
      - name: Generate static site
        working-directory: bsa-web
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
          NUXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NUXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
        run: npx nuxi generate

      # ── 5. Setup SSH ──────────────────────────────────────────────────────────
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # ── 6. rsync static files to server document root ────────────────────────
      #   Destination: ${{ env.DEPLOY_WEB_DIR }} (must match the cPanel docroot
      #   for bhaisepatisportsacademy.com.np — verify with `ls ~` on the server)
      #   --delete removes stale files; .user.ini is a cPanel file — never touch it
      - name: Deploy to server
        run: |
          rsync -rlptzv --delete \
            --exclude='.user.ini' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            bsa-web/.output/public/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/${{ env.DEPLOY_WEB_DIR }}/"
