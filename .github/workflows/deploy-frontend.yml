name: Deploy Frontend

# Triggers on every push to main that touches the frontend
on:
  push:
    branches: [main]
    paths:
      - "bsa-web/**"
      - ".github/workflows/deploy-frontend.yml"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bsa-web/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install npm packages
        working-directory: bsa-web
        run: npm ci

      # ── 4. Build static SPA ──────────────────────────────────────────────────
      #   Output lands in bsa-web/.output/public/
      - name: Generate static site
        working-directory: bsa-web
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
          NUXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NUXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
        run: npx nuxi generate

      # ── 5. Setup SSH ──────────────────────────────────────────────────────────
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # ── 6. rsync static files to server document root ────────────────────────
      #   Destination: ~/bhaisepatisportacademy/bsa-web/
      #   --delete removes stale files; .user.ini is a cPanel file — never touch it
      - name: Deploy to server
        run: |
          rsync -rlptzv --delete \
            --exclude='.user.ini' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            bsa-web/.output/public/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/bhaisepatisportacademy/bsa-web/"
