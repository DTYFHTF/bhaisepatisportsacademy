name: Deploy Backend

# Triggers on every push to main that touches the API
on:
  push:
    branches: [main]
    paths:
      - "bsa-api/**"
      - "!bsa-api/.env*"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

# Server dir for the Laravel API, relative to the rishipa2 home dir. The API
# subdomain docroot points at <this>/public. Confirm against `ls ~` on the server.
env:
  DEPLOY_API_DIR: bhaisepatisportacademy/bsa-api

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bsa-api
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, bcmath, gd, zip
          tools: composer:v2
          coverage: none

      - name: Install Composer packages (with dev, for tests)
        run: composer install --optimize-autoloader --no-interaction --prefer-dist

      - name: Audit dependencies
        run: composer audit

      - name: Prepare test env
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          APP_ENV: testing

      - name: Run tests
        run: php artisan test
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          SESSION_DRIVER: array
          CACHE_STORE: array
          QUEUE_CONNECTION: sync

  build-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v5

      # ── 2. PHP + Composer ────────────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      # ── 3. Install Composer dependencies (no dev, optimised autoloader) ──────
      - name: Install Composer packages
        working-directory: bsa-api
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── 4. Setup SSH ──────────────────────────────────────────────────────────
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # ── 5. rsync application files ────────────────────────────────────────────
      #   Destination: ${{ env.DEPLOY_API_DIR }}
      #   Excluded: .env (managed separately), uploaded files, logs, cache, .git
      - name: Rsync API files
        run: |
          rsync -rlptzv --delete \
            --exclude='.env' \
            --exclude='storage/app/public/' \
            --exclude='storage/logs/' \
            --exclude='bootstrap/cache/' \
            --exclude='.git/' \
            --exclude='database/database.sqlite' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            bsa-api/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/${{ env.DEPLOY_API_DIR }}/"

      # ── 6. Write .env on server ───────────────────────────────────────────────
      #   BACKEND_ENV secret stores the full production .env content.
      #   We base64-encode it to safely handle newlines and special chars.
      - name: Write .env on server
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          printf '%s' "$BACKEND_ENV" | base64 | \
            ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "base64 -d > ~/${{ env.DEPLOY_API_DIR }}/.env"

      # ── 7. Post-deploy Artisan commands ──────────────────────────────────────
      #   If cPanel's PHP binary is not just 'php', adjust to e.g. php8.2 or /usr/local/bin/php82
      - name: Artisan post-deploy
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd ~/${{ env.DEPLOY_API_DIR }} && php artisan config:clear && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan filament:optimize-clear && php artisan migrate --force && (php artisan storage:link 2>/dev/null || true)'
