name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'bsa-api/**'
      - '.github/workflows/deploy-api.yml'

env:
  PHP_VERSION: '8.4'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bsa-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, pdo_mysql, bcmath, gd, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: bsa-api/vendor
          key: ${{ runner.os }}-php-${{ hashFiles('bsa-api/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Install Composer dependencies
        run: composer install --optimize-autoloader --no-progress --prefer-dist

      - name: Copy .env for testing
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: PHP lint
        run: find app -name "*.php" | xargs php -l | grep -v "No syntax errors" | head -5; echo "Lint done"

      - name: Run tests
        run: php artisan test
        env:
          APP_ENV: testing

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Laravel API via SSH
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          API_DOT_ENV: ${{ secrets.API_DOT_ENV }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GH_PAT,API_DOT_ENV
          script: |
            set -e
            # Clone on first deploy; pull on subsequent deploys
            if [ -d ~/bsa/.git ]; then
              git -C ~/bsa remote set-url origin "https://${GH_PAT}@github.com/DTYFHTF/bhaisepatisportacademy.git"
              cd ~/bsa
              git fetch origin main
              git reset --hard origin/main
            else
              rm -rf ~/bsa
              git clone "https://${GH_PAT}@github.com/DTYFHTF/bhaisepatisportacademy.git" ~/bsa
              cd ~/bsa
            fi

            # Write production .env from GitHub secret (always overwrite to keep in sync)
            printf '%s' "${API_DOT_ENV}" > ~/bsa/bsa-api/.env

            # Work in the API subdirectory
            cd ~/bsa/bsa-api

            # Install production dependencies
            composer install --no-dev --optimize-autoloader --no-progress

            # Run pending migrations
            php artisan migrate --force

            # Publish Filament & Livewire assets
            php artisan filament:assets
            php artisan livewire:publish --assets 2>/dev/null || true

            # Clear and rebuild caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Ensure storage symlink
            php artisan storage:link --force 2>/dev/null || true

            # Restart queue workers if running
            php artisan queue:restart 2>/dev/null || true

            # LiteSpeed/OPcache invalidation - touch entry points so cached bytecode is dropped.
            touch ~/bsa/bsa-api/public/index.php
            touch ~/bsa/bsa-api/public/.htaccess 2>/dev/null || true

            echo "BSA API deployed successfully"
